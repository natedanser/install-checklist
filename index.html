<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lightgig Installation Checklist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#222222">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
      color: #222;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      text-align: left;
    }

    .item {
      display: flex;
      align-items: center;
      background: white;
      padding: 14px;
      margin: 6px 0;
      border-radius: 8px;
      font-size: 20px;
      text-align: left;
    }

    input[type="checkbox"] {
      transform: scale(1.5);
      margin-right: 14px;
      flex-shrink: 0;
    }

    button {
      width: 100%;
      font-size: 22px;
      padding: 14px;
      margin-top: 24px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
    }
  </style>
</head>

<body>
  <h1>Lightgig Installation Checklist</h1>

  <label class="item"><input type="checkbox">Take picture of ONT / NID</label>
  <label class="item"><input type="checkbox">Take picture of media can</label>
  <label class="item"><input type="checkbox">Apply all stickers</label>
  <label class="item"><input type="checkbox">Ensure quality of all L1 connections</label>
  <label class="item"><input type="checkbox">Perform speed negotiation and bandwidth testing</label>
  <label class="item"><input type="checkbox">Take picture of router area</label>
  <label class="item"><input type="checkbox">Gather “How Customer Heard About Us” info</label>

  <button onclick="resetChecklist()">Checklist Complete</button>

  <script>
    const inputs = document.querySelectorAll('input[type="checkbox"]');

    inputs.forEach((input, index) => {
      const key = 'installChecklist_' + index;
      input.checked = localStorage.getItem(key) === 'true';

      input.addEventListener('change', () => {
        localStorage.setItem(key, input.checked);
      });
    });

    function resetChecklist() {
      if (confirm('Checklist complete. Reset for the next install?')) {
        localStorage.clear();
        location.reload();
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>
</body>
</html>
